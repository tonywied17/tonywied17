name: badges

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  repository_dispatch:
    types: [refresh-badges]
  push:
    branches: [main]
    paths:
      - '.github/workflows/badges.yml'
      - '.github/scripts/generate-badges.mjs'
      - '.github/scripts/generate-stack.mjs'
      - '.github/scripts/generate-tagline.mjs'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

concurrency:
  group: badges
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        # --ignore-scripts skips puppeteer's chromium download - badges don't need it.
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Generate header + project badges
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node .github/scripts/generate-badges.mjs

      - name: Generate stack cards
        run: node .github/scripts/generate-stack.mjs

      - name: Generate tagline
        run: node .github/scripts/generate-tagline.mjs

      - name: Commit changes
        run: |
          git config user.name  "tonywied17"
          git config user.email "tonywied17@gmail.com"
          git add .github/badges README.md
          if git diff --staged --quiet; then
            echo "No badge changes"
          else
            git commit -m "chore(badges): refresh"
            git pull --rebase origin main
            git push
          fi
