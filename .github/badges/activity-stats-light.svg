<svg xmlns="http://www.w3.org/2000/svg" width="415" height="168" viewBox="0 0 415 168" role="img" aria-label="GitHub stats">
  <defs>
    
    <linearGradient id="pulse-st-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2563eb" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#2563eb" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-st-l"><rect x="0" y="0" width="415" height="168" rx="10" ry="10"/></clipPath>
  </defs>

  <rect x="0.5" y="0.5" width="414" height="167" rx="10" ry="10" fill="none" stroke="#d0d7de"/>

  <g clip-path="url(#clip-st-l)">
    <line x1="0" y1="28" x2="415" y2="28" stroke="#eaecef" stroke-width="1"/>
    <rect x="-174" y="27" width="174" height="1" fill="url(#pulse-st-l)">
    <animate attributeName="x" from="-174" to="415" dur="7s" repeatCount="indefinite"/>
  </rect>
  </g>

  <g font-family="Segoe UI, Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <text x="14" y="20" font-size="13" font-weight="700" fill="#0b1220" letter-spacing="-0.1">Stats</text>
    <text x="401" y="20" text-anchor="end" font-size="11" font-weight="600" fill="#656d76" letter-spacing="1.2">all time</text>
  </g>

  <g><line x1="110.8" y1="46" x2="110.8" y2="154" stroke="#eaecef" stroke-width="1"/><line x1="207.5" y1="46" x2="207.5" y2="154" stroke="#eaecef" stroke-width="1"/><line x1="304.3" y1="46" x2="304.3" y2="154" stroke="#eaecef" stroke-width="1"/><line x1="14" y1="100.0" x2="401" y2="100.0" stroke="#eaecef" stroke-width="1"/></g>
  <g font-family="Segoe UI, Inter, -apple-system, BlinkMacSystemFont, sans-serif">
      <g text-anchor="middle">
