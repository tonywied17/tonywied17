<svg xmlns="http://www.w3.org/2000/svg" width="880" height="110" viewBox="0 0 880 110" role="img" aria-label="Activity streak">
  <defs>
    <linearGradient id="bg-sk-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f8fb"/>
    </linearGradient>
    <linearGradient id="ac-sk-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="tint-sk-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clip-sk-l"><rect x="0" y="0" width="880" height="110" rx="12" ry="12"/></clipPath>
  </defs>
  
  <rect x="0" y="0" width="880" height="110" rx="12" ry="12" fill="url(#bg-sk-l)"/>
  <rect x="0" y="0" width="880" height="110" rx="12" ry="12" fill="url(#tint-sk-l)"/>
  
  <path id="bd-sk-l" d="M 12.5 1 H 867.5 A 11.5 11.5 0 0 1 879 12.5 V 97.5 A 11.5 11.5 0 0 1 867.5 109 H 12.5 A 11.5 11.5 0 0 1 1 97.5 V 12.5 A 11.5 11.5 0 0 1 12.5 1 Z" fill="none"/>
  <use href="#bd-sk-l" stroke="#e4e7ee" stroke-width="1"/>
  <use href="#bd-sk-l" stroke="url(#ac-sk-l)" stroke-width="1.2" stroke-opacity="0.55"/>
  <use href="#bd-sk-l" stroke="url(#ac-sk-l)" stroke-width="2" stroke-dasharray="234 1718.2566310325653" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="0" to="-1952.2566310325653" dur="6s" repeatCount="indefinite"/>
  </use>
  
  <g clip-path="url(#clip-sk-l)">
    <circle r="2.1" fill="#f59e0b"><animateMotion dur="7s" repeatCount="indefinite" rotate="auto"><mpath href="#bd-sk-l"/></animateMotion></circle>
    <circle r="1.6" fill="#ef4444"><animateMotion dur="7s" begin="-1.75s" repeatCount="indefinite" rotate="auto"><mpath href="#bd-sk-l"/></animateMotion></circle>
    <circle r="1.3" fill="#f59e0b" opacity="0.75"><animateMotion dur="7s" begin="-3.5s" repeatCount="indefinite" rotate="auto"><mpath href="#bd-sk-l"/></animateMotion></circle>
    <circle r="1" fill="#ef4444" opacity="0.7"><animateMotion dur="7s" begin="-5.25s" repeatCount="indefinite" rotate="auto"><mpath href="#bd-sk-l"/></animateMotion></circle>
  </g>
  <g><line x1="302.7" y1="28" x2="302.7" y2="82" stroke="#eef0f5" stroke-width="1"/><line x1="577.3" y1="28" x2="577.3" y2="82" stroke="#eef0f5" stroke-width="1"/></g>
  <g font-family="Segoe UI, Inter, -apple-system, BlinkMacSystemFont, sans-serif">
    <g text-anchor="middle">
      <text x="165.3" y="52" font-size="24" font-weight="800" fill="#0b1220" letter-spacing="-0.4" opacity="0">
        3 days
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.2s" fill="freeze"/>
      </text>
      <text x="165.3" y="74" font-size="10" font-weight="700" fill="#5b6472" letter-spacing="2.2">CURRENT STREAK</text>
    </g>
    <g text-anchor="middle">
      <text x="440.0" y="52" font-size="24" font-weight="800" fill="#0b1220" letter-spacing="-0.4" opacity="0">
        15 days
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.32s" fill="freeze"/>
      </text>
      <text x="440.0" y="74" font-size="10" font-weight="700" fill="#5b6472" letter-spacing="2.2">LONGEST STREAK</text>
    </g>
    <g text-anchor="middle">
      <text x="714.7" y="52" font-size="24" font-weight="800" fill="#0b1220" letter-spacing="-0.4" opacity="0">
        85 / 365
        <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.44s" fill="freeze"/>
      </text>
      <text x="714.7" y="74" font-size="10" font-weight="700" fill="#5b6472" letter-spacing="2.2">ACTIVE DAYS</text>
    </g></g>
</svg>
